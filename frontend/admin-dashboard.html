<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Deepfake Detection</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Chart.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="nav-brand"><h1>🔒 Admin Portal</h1></div>
        <div class="nav-links">
            <span id="admin-name" class="user-name"></span>
            <a href="admin-dashboard.html" class="active">Dashboard</a>
            <button onclick="logout()" class="btn btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="dashboard-container">
    <div class="container">

        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <p>Monitor system statistics and user activity</p>
        </div>

        <!-- Stat cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3 id="total-users">–</h3>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <h3 id="total-detections">–</h3>
                    <p>Total Detections</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-info">
                    <h3 id="fake-detections">–</h3>
                    <p>Fake Detected</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h3 id="real-detections">–</h3>
                    <p>Real Content</p>
                </div>
            </div>
        </div>

        <!-- Activity chart (last 7 days) -->
        <div class="chart-card" style="background:white;border-radius:12px;
             padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:2rem;">
            <h2 style="color:#2d3748;margin-bottom:1rem;">Detections – Last 7 Days</h2>
            <canvas id="activity-chart" height="80"></canvas>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="users">Users</button>
            <button class="tab-btn"        data-tab="detections">All Detections</button>
        </div>

        <div id="users-tab" class="tab-content active">
            <h2>User Management</h2>
            <div id="users-list" class="data-table">
                <div class="loading">Loading users…</div>
            </div>
        </div>

        <div id="detections-tab" class="tab-content">
            <h2>Detection History</h2>
            <div id="detections-list" class="data-table">
                <div class="loading">Loading detections…</div>
            </div>
        </div>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
