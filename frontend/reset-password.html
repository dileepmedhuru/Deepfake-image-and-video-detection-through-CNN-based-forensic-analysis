<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Deepfake Detection</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔍 Deepfake Detector</h1>
            <h2>Reset Password</h2>
            <p>Choose a strong new password.</p>
        </div>
        <div id="error-message"   class="error-message"   style="display:none;"></div>
        <div id="success-message" class="success-message" style="display:none;"></div>
        <div id="invalid-token"   style="display:none;text-align:center;padding:2rem;">
            <p style="color:#dc2626;font-size:1.1rem;">⚠️ This reset link is invalid or has expired.</p>
            <a href="forgot-password.html" class="btn btn-primary" style="margin-top:1rem;">Request New Link</a>
        </div>
        <form id="reset-form" class="auth-form">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" required placeholder="At least 8 chars…">
                <small class="form-hint">8+ chars · uppercase · lowercase · number · special character</small>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" required placeholder="Repeat new password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                <span id="btn-text">Reset Password</span>
                <span id="btn-loader" class="loader" style="display:none;"></span>
            </button>
        </form>
        <div class="auth-footer"><p><a href="login.html">← Back to Login</a></p></div>
    </div>
</div>
<script src="js/config.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
    document.getElementById('reset-form').style.display='none';
    document.getElementById('invalid-token').style.display='block';
}

function showError(m)   { const e=document.getElementById('error-message');   e.textContent=m; e.style.display='block'; }
function showSuccess(m) { const e=document.getElementById('success-message'); e.textContent=m; e.style.display='block'; }
function setLoading(on) {
    document.getElementById('submit-btn').disabled=on;
    document.getElementById('btn-text').style.display  =on?'none':'inline';
    document.getElementById('btn-loader').style.display=on?'inline-block':'none';
}
function validatePw(p) {
    if(p.length<8)          return 'At least 8 characters required.';
    if(!/[A-Z]/.test(p))    return 'Must contain an uppercase letter.';
    if(!/[a-z]/.test(p))    return 'Must contain a lowercase letter.';
    if(!/[0-9]/.test(p))    return 'Must contain a number.';
    if(!/[!@#$%^&*(),.?":{}|<>]/.test(p)) return 'Must contain a special character.';
    return null;
}

document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('error-message').style.display='none';
    const pw  = document.getElementById('new_password').value;
    const cpw = document.getElementById('confirm_password').value;
    if (pw !== cpw) return showError('Passwords do not match.');
    const err = validatePw(pw);
    if (err) return showError(err);
    setLoading(true);
    try {
        const res = await API.request(API_CONFIG.ENDPOINTS.RESET_PASSWORD, {
            method:'POST', body:JSON.stringify({token, new_password:pw}), skipAuth:true
        });
        showSuccess(res.message+' Redirecting to login…');
        setTimeout(()=>window.location.href='login.html', 2000);
    } catch(err) {
        showError(err.message||'Reset failed.');
        if (err.message&&err.message.includes('invalid')) {
            document.getElementById('reset-form').style.display='none';
            document.getElementById('invalid-token').style.display='block';
        }
    } finally { setLoading(false); }
});
</script>
</body>
</html>
