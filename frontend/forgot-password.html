<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Deepfake Detection</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔍 Deepfake Detector</h1>
            <h2>Forgot Password?</h2>
            <p>Enter your email and we'll send a reset link.</p>
        </div>
        <div id="error-message"   class="error-message"   style="display:none;"></div>
        <div id="success-message" class="success-message" style="display:none;"></div>
        <form id="forgot-form" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                <span id="btn-text">Send Reset Link</span>
                <span id="btn-loader" class="loader" style="display:none;"></span>
            </button>
        </form>
        <div class="auth-footer">
            <p><a href="login.html">← Back to Login</a></p>
        </div>
    </div>
</div>
<script src="js/config.js"></script>
<script>
function showError(m)   { const e=document.getElementById('error-message');   e.textContent=m; e.style.display='block'; }
function showSuccess(m) { const e=document.getElementById('success-message'); e.textContent=m; e.style.display='block'; }
function setLoading(on) {
    document.getElementById('submit-btn').disabled=on;
    document.getElementById('btn-text').style.display  =on?'none':'inline';
    document.getElementById('btn-loader').style.display=on?'inline-block':'none';
}

document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('error-message').style.display='none';
    document.getElementById('success-message').style.display='none';
    const email = document.getElementById('email').value.trim().toLowerCase();
    setLoading(true);
    try {
        const res = await API.request(API_CONFIG.ENDPOINTS.FORGOT_PASSWORD, {
            method:'POST', body:JSON.stringify({email}), skipAuth:true
        });
        showSuccess(res.message);
        document.getElementById('forgot-form').reset();
    } catch(err) {
        showError(err.message||'Request failed.');
    } finally { setLoading(false); }
});
</script>
</body>
</html>
